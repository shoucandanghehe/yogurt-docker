name: Build and Push to GHCR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0-dev.177)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      upstream_version: ${{ steps.version.outputs.upstream_version }}
      push: ${{ steps.version.outputs.push }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            # Extract upstream version (remove patch suffix like .1, .2)
            UPSTREAM_VERSION=$(echo "$VERSION" | sed -E 's/\.[0-9]+$//')
            echo "push=true" >> $GITHUB_OUTPUT
          else
            VERSION="${GITHUB_REF#refs/tags/}"
            # Extract upstream version (remove patch suffix like .1, .2)
            UPSTREAM_VERSION=$(echo "$VERSION" | sed -E 's/\.[0-9]+$//')
            echo "push=true" >> $GITHUB_OUTPUT
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "upstream_version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT
          echo "Image version: $VERSION"
          echo "Upstream version: $UPSTREAM_VERSION"

  build-x64:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        if: needs.prepare.outputs.push == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: needs.prepare.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: needs.prepare.outputs.push == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}-amd64
          build-args: |
            YOGURT_VERSION=${{ needs.prepare.outputs.upstream_version }}
            YOGURT_ARCH=linux-x64
          cache-from: type=gha
          cache-to: type=gha,mode=min

  build-arm64:
    needs: prepare
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        if: needs.prepare.outputs.push == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: needs.prepare.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: needs.prepare.outputs.push == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}-arm64
          build-args: |
            YOGURT_VERSION=${{ needs.prepare.outputs.upstream_version }}
            YOGURT_ARCH=linux-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=min

  manifest:
    needs: [prepare, build-x64, build-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        if: needs.prepare.outputs.push == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: needs.prepare.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        if: needs.prepare.outputs.push == 'true'
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}-arm64
