name: Build and Push to GHCR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0-dev.177)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-x64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="latest"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "tagged=${{ github.event.inputs.version != '' || startsWith(github.ref, 'refs/tags/') }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        if: steps.version.outputs.tagged == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: steps.version.outputs.tagged == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short
            type=raw,value=${{ steps.version.outputs.VERSION }}

      - name: Build and push
        if: steps.version.outputs.tagged == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-linux-x64
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-x86_64
          build-args: |
            YOGURT_VERSION=${{ steps.version.outputs.VERSION }}
            YOGURT_ARCH=linux-x64
          labels: ${{ steps.meta.outputs.labels }}

      # Build without push for non-tagged builds (test build)
      - name: Build only (no push)
        if: steps.version.outputs.tagged != 'true'
        run: |
          docker build \
            --build-arg YOGURT_VERSION=${{ steps.version.outputs.VERSION }} \
            --build-arg YOGURT_ARCH=linux-x64 \
            -t yogurt:test .

  build-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="latest"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "tagged=${{ github.event.inputs.version != '' || startsWith(github.ref, 'refs/tags/') }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        if: steps.version.outputs.tagged == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: steps.version.outputs.tagged == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short
            type=raw,value=${{ steps.version.outputs.VERSION }}

      - name: Build and push
        if: steps.version.outputs.tagged == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-linux-arm64
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-aarch64
          build-args: |
            YOGURT_VERSION=${{ steps.version.outputs.VERSION }}
            YOGURT_ARCH=linux-arm64
          labels: ${{ steps.meta.outputs.labels }}

      # Build without push for non-tagged builds (test build)
      - name: Build only (no push)
        if: steps.version.outputs.tagged != 'true'
        run: |
          docker build \
            --build-arg YOGURT_VERSION=${{ steps.version.outputs.VERSION }} \
            --build-arg YOGURT_ARCH=linux-arm64 \
            -t yogurt:test .
