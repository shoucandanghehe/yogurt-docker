name: Build and Push to GHCR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0-dev.177)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: linux-x64
            platform: linux/amd64
            docker_arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: linux-arm64
            platform: linux/arm64
            docker_arch: aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "push=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "push=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            VERSION="latest"
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "push=true" >> $GITHUB_OUTPUT
          else
            VERSION="latest"
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "push=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.version.outputs.push == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: steps.version.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.version.outputs.push == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-${{ matrix.arch }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-${{ matrix.docker_arch }}
          build-args: |
            YOGURT_VERSION=${{ steps.version.outputs.VERSION }}
            YOGURT_ARCH=${{ matrix.arch }}

      # Build without push for non-tagged builds (test build)
      - name: Build only (no push)
        if: steps.version.outputs.push == 'false'
        run: |
          docker build \
            --build-arg YOGURT_VERSION=${{ steps.version.outputs.VERSION }} \
            --build-arg YOGURT_ARCH=${{ matrix.arch }} \
            -t yogurt:test .
