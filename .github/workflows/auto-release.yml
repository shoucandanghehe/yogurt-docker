name: Auto Release

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Check for updates
        id: check
        run: |
          # Fetch latest release from upstream
          LATEST_VERSION=$(curl -fsSL "https://api.github.com/repos/SaltifyDev/yogurt-releases/releases/latest" | jq -r '.tag_name')

          if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" = "null" ]; then
            echo "Failed to fetch latest version"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Latest upstream version: $LATEST_VERSION"

          # Check if we already have this version
          if git rev-parse "$LATEST_VERSION" >/dev/null 2>&1; then
            echo "Version $LATEST_VERSION already exists"
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "new_version=" >> $GITHUB_OUTPUT
          else
            echo "New version detected: $LATEST_VERSION"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "new_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: steps.check.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.check.outputs.new_version }}
          git push origin ${{ steps.check.outputs.new_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
